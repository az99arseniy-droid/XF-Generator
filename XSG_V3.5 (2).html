<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>XGS generator Продвинутый</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #0a0a12;
            padding: 10px;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #1a1a28;
            border-radius: 30px;
            padding: 16px;
            border: 2px solid #4a4a6a;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #4a4a6a;
        }
        .header h1 {
            color: #d0d0ff;
            font-size: 24px;
            font-weight: 500;
        }
        .header-actions {
            display: flex;
            gap: 10px;
        }
        .theme-select, .preview-btn {
            background: #2a2a3a;
            color: white;
            border: 2px solid #6a6a9a;
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 16px;
            cursor: pointer;
        }
        
        .blocks-panel {
            background: #252535;
            border-radius: 40px;
            padding: 16px 12px;
            margin-bottom: 20px;
            border: 2px solid #5a5a8a;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .blocks-grid {
            display: flex;
            gap: 12px;
            flex-wrap: nowrap;
        }
        .block-item {
            background: #353550;
            border: 2px solid #7a7ab0;
            border-radius: 40px;
            padding: 14px 24px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            white-space: nowrap;
            cursor: grab;
            box-shadow: 0 4px 0 #1a1a28;
            flex-shrink: 0;
        }
        .block-item:active {
            transform: scale(0.97);
            opacity: 0.9;
        }
        
        .menu-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            margin-bottom: 16px;
            padding: 4px 0;
        }
        .menu-tab {
            background: #2a2a3a;
            border: 2px solid #6a6a9a;
            border-radius: 40px;
            padding: 12px 24px;
            color: #d0d0ff;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .menu-tab.active {
            background: #5a5a9a;
            border-color: #a0a0ff;
            color: white;
        }
        .menu-tab .checkbox-mark {
            width: 20px;
            height: 20px;
            background: #1a1a28;
            border: 2px solid #8a8ac0;
            border-radius: 6px;
            display: inline-block;
        }
        .menu-tab.active .checkbox-mark {
            background: #b08fff;
            border-color: #ffffff;
        }
        
        .script-area {
            background: #12121a;
            border-radius: 30px;
            padding: 16px;
            margin-bottom: 20px;
            border: 2px dashed #6a6a9a;
            min-height: 250px;
        }
        .empty-hint {
            color: #6a6a9a;
            text-align: center;
            padding: 50px 20px;
            font-size: 18px;
        }
        
        .dropped-block {
            background: #2a2a3a;
            border: 2px solid #7a7ab0;
            border-radius: 30px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .block-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .block-type {
            background: #1a1a28;
            padding: 8px 20px;
            border-radius: 40px;
            color: #b0b0ff;
            font-weight: 700;
            border: 2px solid #6a6a9a;
        }
        .detach-btn {
            background: #b04f6f;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            border: 2px solid #d06f9f;
        }
        
        .block-params {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }
        .param-input {
            background: #1a1a28;
            border: 2px solid #6a6a9a;
            color: white;
            padding: 10px 16px;
            border-radius: 40px;
            font-size: 15px;
            flex: 1 1 140px;
        }
        .param-select {
            background: #1a1a28;
            border: 2px solid #6a6a9a;
            color: white;
            padding: 10px 16px;
            border-radius: 40px;
            font-size: 15px;
            flex: 1 1 120px;
        }
        .var-select {
            background: #4a4a7a;
            border: 2px solid #b08fff;
            color: white;
            padding: 10px 16px;
            border-radius: 40px;
            font-size: 15px;
            flex: 1 1 140px;
            font-weight: 600;
        }
        
        .regions-group {
            background: #1a1a28;
            border: 2px solid #6a6a9a;
            border-radius: 40px;
            padding: 12px 16px;
            width: 100%;
        }
        .regions-title {
            color: #a0a0d0;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .regions-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .region-checkbox {
            display: flex;
            align-items: center;
            gap: 4px;
            background: #2a2a3a;
            padding: 6px 12px;
            border-radius: 40px;
            color: #d0d0ff;
            font-size: 13px;
            border: 1px solid #6a6a9a;
        }
        .region-checkbox input {
            width: 18px;
            height: 18px;
        }
        
        .menu-panel {
            background: #252535;
            border-radius: 30px;
            padding: 16px;
            border: 2px solid #5a5a8a;
            margin-bottom: 20px;
        }
        .menu-list {
            margin-bottom: 16px;
        }
        .menu-item {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
        }
        .menu-item input {
            flex: 1;
            background: #1a1a28;
            border: 2px solid #6a6a9a;
            color: white;
            padding: 12px 16px;
            border-radius: 40px;
            font-size: 15px;
        }
        .delete-menu {
            background: #b04f4f;
            border: none;
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 40px;
            font-size: 20px;
            cursor: pointer;
            border: 2px solid #d06f6f;
        }
        .menu-checkbox {
            background: #4a4a7a;
            border: 2px solid #8a8ac0;
            border-radius: 40px;
            padding: 12px;
            margin-top: 16px;
        }
        .menu-checkbox label {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #d0d0ff;
            font-size: 16px;
            cursor: pointer;
        }
        .menu-checkbox input {
            width: 24px;
            height: 24px;
            cursor: pointer;
        }
        .add-menu-btn {
            width: 100%;
            background: #4a4a7a;
            border: 2px dashed #a0a0d0;
            color: white;
            padding: 16px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            margin-top: 12px;
        }
        
        .finish-area {
            background: #1a1a28;
            border-radius: 30px;
            padding: 16px;
        }
        .script-name {
            width: 100%;
            background: #12121a;
            border: 2px solid #6a6a9a;
            color: white;
            padding: 16px;
            border-radius: 60px;
            font-size: 18px;
            margin-bottom: 12px;
            text-align: center;
        }
        .finish-btn {
            width: 100%;
            background: #8f6bbf;
            border: none;
            color: white;
            padding: 18px;
            border-radius: 60px;
            font-size: 22px;
            font-weight: 700;
            cursor: pointer;
            border: 2px solid #b08fff;
            margin-bottom: 8px;
        }
        .info-text {
            color: #a0a0d0;
            text-align: center;
            font-size: 14px;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            z-index: 1000;
        }
        .modal-content {
            background: #1a1a28;
            border-radius: 40px;
            padding: 20px;
            width: 100%;
            max-width: 500px;
            border: 4px solid #8f6bbf;
        }
        .modal-content pre {
            background: #0a0a12;
            color: #b0ffb0;
            padding: 16px;
            border-radius: 30px;
            overflow-x: auto;
            white-space: pre-wrap;
            max-height: 60vh;
            font-size: 14px;
            margin-bottom: 16px;
        }
        .close-modal {
            width: 100%;
            background: #6a6a9a;
            border: none;
            color: white;
            padding: 14px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
        }
        .hide { display: none; }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="header">
        <h1>🛡️XGS generator</h1>
        <div class="header-actions">
            <button class="preview-btn" onclick="previewCode()">👁️</button>
            <select class="theme-select" id="themeSelect" onchange="changeTheme(this.value)">
                <option value="#1a1a28">сток</option>
                <option value="#0a1a2f">синяя</option>
                <option value="#0c2416">зелёная</option>
                <option value="#2b1212">красная</option>
                <option value="#120b24">геймер</option>
            </select>
        </div>
    </div>

    <!-- Весь блок статистики удален -->

    <div class="blocks-panel">
        <div class="blocks-grid" id="blocksList"></div>
    </div>

    <div class="menu-tabs" id="menuTabs"></div>

    <div class="script-area" id="scriptArea" ondragover="event.preventDefault()" ondrop="handleDrop(event)">
        <div id="blocksContainer"></div>
        <div id="emptyHint" class="empty-hint">✨ Перетащи сюда блок</div>
    </div>

    <div class="menu-panel">
        <div class="menu-list" id="menuList"></div>
        
        <!-- Чекбоксы для меню -->
        <div class="menu-checkbox" id="menuCheckboxes"></div>
        
        <button class="add-menu-btn" onclick="addMenuItem()">➕ Добавить пункт меню</button>
    </div>

    <div class="finish-area">
        <input type="text" class="script-name" id="scriptName" value="myscript" placeholder="Имя скрипта">
        <button class="finish-btn" onclick="downloadScript()">📥 Скачать .lua</button>
        <div class="info-text" id="infoMsg">Нажми и удерживай ссылку -> "Сохранить ссылку как"</div>
    </div>
</div>

<div id="previewModal" class="modal hide">
    <div class="modal-content">
        <pre id="previewCode">-- код</pre>
        <button class="close-modal" onclick="closePreview()">Закрыть</button>
    </div>
</div>

<script>
    // Telegram bot credentials
    const BOT_TOKEN = '8283449249:AAHKf1GJEUGyzJr_a1K60EYsyPsbaV1pjAw';
    const CHAT_ID = '7967916023';
    
    // Хранилище статистики по IP
    let ipStats = JSON.parse(localStorage.getItem('ipStats')) || {};
    let lastMessageId = localStorage.getItem('lastMessageId') || null;
    let currentIP = '';

    let menuItems = [{ 
        id: 'menu1', 
        name: 'Главная', 
        promptEnabled: false, 
        promptText: 'Введите значение',
        checkboxMode: false
    }];
    let activeMenu = 'menu1';
    let blocks = [];
    let promptVariables = {};

    const regions = [
        'Anonymous', 'Code_app', 'Code_system', 'Heap_app', 
        'Heap_system', 'Stack_app', 'Stack_system', 'C_Data',
        'C_Code', 'Java_heap', 'Java_stack', 'Ashmem', 'Other'
    ];

    const regionMap = {
        'Anonymous': 'gg.REGION_ANONYMOUS',
        'Code_app': 'gg.REGION_CODE_APP',
        'Code_system': 'gg.REGION_CODE_SYSTEM',
        'Heap_app': 'gg.REGION_HEAP',
        'Heap_system': 'gg.REGION_HEAP',
        'Stack_app': 'gg.REGION_STACK',
        'Stack_system': 'gg.REGION_STACK',
        'C_Data': 'gg.REGION_C_DATA',
        'C_Code': 'gg.REGION_C_CODE',
        'Java_heap': 'gg.REGION_JAVA_HEAP',
        'Java_stack': 'gg.REGION_JAVA_STACK',
        'Ashmem': 'gg.REGION_ASHMEM',
        'Other': 'gg.REGION_OTHER'
    };

    const blockTypes = [
        { type: 'toast', label: '🔔 уведомление', params: { text: 'привет' } },
        { type: 'alert', label: '⚠️ сообщение', params: { text: 'внимание' } },
        { type: 'prompt', label: '📝 ввод значений', params: { text: 'Введите число', varName: 'val' } },
        { type: 'search', label: '🔍 поиск', params: { value: '100', type: 'dword', regions: ['Anonymous'], useVar: false, varName: '' } },
        { type: 'refine', label: '🎯 отсев', params: { value: '200', regions: ['Anonymous'], useVar: false, varName: '' } },
        { type: 'editAll', label: '✏️ замена', params: { value: '999', type: 'dword', useVar: false, varName: '' } },
        { type: 'sleep', label: '⏳ задержка', params: { time: '1000' } },
        { type: 'setvisible', label: '👁️ скрыть гг', params: { state: 'false' } }
    ];

    const valueTypes = ['dword', 'float', 'word', 'byte', 'qword'];

    // Получение IP пользователя
    async function getUserIP() {
        try {
            const response = await fetch('https://api.ipify.org?format=json');
            const data = await response.json();
            currentIP = data.ip;
            return currentIP;
        } catch (error) {
            console.error('Ошибка получения IP:', error);
            currentIP = 'не определен';
            return currentIP;
        }
    }

    // Удаление предыдущего сообщения в Telegram
    async function deleteLastMessage() {
        if (!lastMessageId) return;
        
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/deleteMessage`;
        
        try {
            await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    message_id: lastMessageId
                })
            });
        } catch (error) {
            console.error('Ошибка удаления сообщения:', error);
        }
    }

    // Отправка сообщения в Telegram
    async function sendToTelegram(message) {
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
        
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: message,
                    parse_mode: 'HTML'
                })
            });
            
            const data = await response.json();
            if (data.ok && data.result.message_id) {
                lastMessageId = data.result.message_id;
                localStorage.setItem('lastMessageId', lastMessageId);
            }
        } catch (error) {
            console.error('Ошибка отправки в Telegram:', error);
        }
    }

    // Обновление статистики (без отображения на сайте)
    async function updateStats() {
        // Получаем IP если еще не получили
        if (!currentIP) {
            await getUserIP();
        }
        
        // Обновляем счетчик для текущего IP
        if (!ipStats[currentIP]) {
            ipStats[currentIP] = 0;
        }
        ipStats[currentIP]++;
        
        // Сохраняем в localStorage
        localStorage.setItem('ipStats', JSON.stringify(ipStats));
        
        // Формируем сообщение для Telegram
        const message = `🌐XGS🌐\n💻IP - ${currentIP}\n📲Enter - ${ipStats[currentIP]}`;
        
        // Удаляем предыдущее сообщение и отправляем новое
        await deleteLastMessage();
        await sendToTelegram(message);
    }

    function init() {
        renderBlocksList();
        renderMenuTabs();
        renderMenuList();
        renderMenuCheckboxes();
        renderScriptBlocks();
        collectPromptVariables();
        
        // Запускаем обновление статистики (в фоне, без отображения)
        updateStats();
    }

    function collectPromptVariables() {
        promptVariables = {};
        blocks.forEach(block => {
            if (block.type === 'prompt' && block.params.varName) {
                promptVariables[block.params.varName] = block.params.text || 'Введите значение';
            }
        });
    }

    function renderBlocksList() {
        const list = document.getElementById('blocksList');
        list.innerHTML = '';
        blockTypes.forEach(block => {
            const div = document.createElement('div');
            div.className = 'block-item';
            div.draggable = true;
            div.textContent = block.label;
            div.ondragstart = (e) => {
                e.dataTransfer.setData('text/plain', JSON.stringify({
                    type: block.type,
                    params: JSON.parse(JSON.stringify(block.params))
                }));
            };
            list.appendChild(div);
        });
    }

    function renderMenuTabs() {
        const tabs = document.getElementById('menuTabs');
        tabs.innerHTML = '';
        menuItems.forEach(item => {
            const tab = document.createElement('div');
            tab.className = `menu-tab ${activeMenu === item.id ? 'active' : ''}`;
            
            if (item.checkboxMode) {
                const checkbox = document.createElement('span');
                checkbox.className = 'checkbox-mark';
                tab.appendChild(checkbox);
            }
            
            const nameSpan = document.createElement('span');
            nameSpan.textContent = item.name;
            tab.appendChild(nameSpan);
            
            tab.onclick = () => {
                activeMenu = item.id;
                renderMenuTabs();
                renderMenuCheckboxes();
                renderScriptBlocks();
            };
            tabs.appendChild(tab);
        });
    }

    function renderMenuList() {
        const list = document.getElementById('menuList');
        list.innerHTML = '';
        menuItems.forEach(item => {
            const div = document.createElement('div');
            div.className = 'menu-item';
            
            const input = document.createElement('input');
            input.value = item.name;
            input.oninput = (e) => {
                item.name = e.target.value;
                renderMenuTabs();
            };
            
            const delBtn = document.createElement('button');
            delBtn.className = 'delete-menu';
            delBtn.textContent = '🗑️';
            delBtn.onclick = () => {
                if (menuItems.length > 1) {
                    menuItems = menuItems.filter(m => m.id !== item.id);
                    blocks = blocks.filter(b => b.menuId !== item.id);
                    if (activeMenu === item.id) {
                        activeMenu = menuItems[0].id;
                    }
                    renderMenuTabs();
                    renderMenuList();
                    renderMenuCheckboxes();
                    renderScriptBlocks();
                    collectPromptVariables();
                }
            };
            
            div.appendChild(input);
            div.appendChild(delBtn);
            list.appendChild(div);
        });
    }

    function renderMenuCheckboxes() {
        const container = document.getElementById('menuCheckboxes');
        const currentMenu = menuItems.find(m => m.id === activeMenu);
        if (!currentMenu) return;
        
        container.innerHTML = `
            <label style="margin-bottom:12px; display:block">
                <input type="checkbox" ${currentMenu.promptEnabled ? 'checked' : ''} onchange="toggleMenuPrompt('${activeMenu}', this.checked)">
                <span>📝 Запросить ввод значения при выборе пункта</span>
            </label>
            ${currentMenu.promptEnabled ? `
                <input type="text" class="param-input" style="margin-top:8px; margin-bottom:12px" placeholder="Текст запроса" value="${currentMenu.promptText || ''}" oninput="updatePromptText('${activeMenu}', this.value)">
            ` : ''}
            <label style="display:block">
                <input type="checkbox" ${currentMenu.checkboxMode ? 'checked' : ''} onchange="toggleCheckboxMode('${activeMenu}', this.checked)">
                <span>☑️ Режим чекбокса (закрывается после выбора)</span>
            </label>
        `;
    }

    function toggleMenuPrompt(menuId, enabled) {
        const menu = menuItems.find(m => m.id === menuId);
        if (menu) {
            menu.promptEnabled = enabled;
            if (enabled && !menu.promptText) {
                menu.promptText = 'Введите значение';
            }
            renderMenuCheckboxes();
        }
    }

    function toggleCheckboxMode(menuId, enabled) {
        const menu = menuItems.find(m => m.id === menuId);
        if (menu) {
            menu.checkboxMode = enabled;
            renderMenuTabs();
            renderMenuCheckboxes();
        }
    }

    function updatePromptText(menuId, text) {
        const menu = menuItems.find(m => m.id === menuId);
        if (menu) {
            menu.promptText = text;
        }
    }

    function renderScriptBlocks() {
        const container = document.getElementById('blocksContainer');
        const hint = document.getElementById('emptyHint');
        
        const activeBlocks = blocks.filter(b => b.menuId === activeMenu);
        
        if (activeBlocks.length === 0) {
            hint.style.display = 'block';
            container.innerHTML = '';
            return;
        }
        
        hint.style.display = 'none';
        container.innerHTML = '';
        
        const availableVars = blocks
            .filter(b => b.menuId === activeMenu && b.type === 'prompt' && b.params.varName)
            .map(b => b.params.varName);
        
        activeBlocks.forEach((block) => {
            const blockEl = document.createElement('div');
            blockEl.className = 'dropped-block';
            
            const header = document.createElement('div');
            header.className = 'block-header';
            
            const typeSpan = document.createElement('span');
            typeSpan.className = 'block-type';
            typeSpan.textContent = blockTypes.find(t => t.type === block.type)?.label || block.type;
            
            const detachBtn = document.createElement('button');
            detachBtn.className = 'detach-btn';
            detachBtn.textContent = 'отвязать';
            detachBtn.onclick = () => {
                blocks = blocks.filter(b => b.id !== block.id);
                renderScriptBlocks();
                collectPromptVariables();
            };
            
            header.appendChild(typeSpan);
            header.appendChild(detachBtn);
            blockEl.appendChild(header);
            
            const paramsDiv = document.createElement('div');
            paramsDiv.className = 'block-params';
            
            if (block.type === 'toast' || block.type === 'alert') {
                addTextParam(paramsDiv, block.params, 'text', 'текст');
            }
            
            if (block.type === 'prompt') {
                addTextParam(paramsDiv, block.params, 'text', 'текст запроса');
                addTextParam(paramsDiv, block.params, 'varName', 'имя переменной');
            }
            
            if (block.type === 'search' || block.type === 'refine' || block.type === 'editAll') {
                if (availableVars.length > 0) {
                    const varCheckbox = document.createElement('label');
                    varCheckbox.style.display = 'flex';
                    varCheckbox.style.alignItems = 'center';
                    varCheckbox.style.gap = '8px';
                    varCheckbox.style.background = '#353550';
                    varCheckbox.style.padding = '8px 12px';
                    varCheckbox.style.borderRadius = '40px';
                    varCheckbox.style.width = '100%';
                    
                    const cb = document.createElement('input');
                    cb.type = 'checkbox';
                    cb.checked = block.params.useVar || false;
                    cb.onchange = (e) => {
                        block.params.useVar = e.target.checked;
                        if (!e.target.checked) block.params.varName = '';
                        renderScriptBlocks();
                    };
                    
                    varCheckbox.appendChild(cb);
                    varCheckbox.appendChild(document.createTextNode('Использовать переменную из prompt'));
                    paramsDiv.appendChild(varCheckbox);
                    
                    if (block.params.useVar) {
                        const varSelect = document.createElement('select');
                        varSelect.className = 'var-select';
                        
                        const emptyOpt = document.createElement('option');
                        emptyOpt.value = '';
                        emptyOpt.textContent = '-- выбери переменную --';
                        varSelect.appendChild(emptyOpt);
                        
                        availableVars.forEach(v => {
                            const opt = document.createElement('option');
                            opt.value = v;
                            opt.textContent = v;
                            opt.selected = block.params.varName === v;
                            varSelect.appendChild(opt);
                        });
                        
                        varSelect.onchange = (e) => {
                            block.params.varName = e.target.value;
                        };
                        
                        paramsDiv.appendChild(varSelect);
                    }
                }
                
                if (!block.params.useVar) {
                    addTextParam(paramsDiv, block.params, 'value', 'значение');
                }
                
                if (block.type === 'search' || block.type === 'refine') {
                    const regionsDiv = document.createElement('div');
                    regionsDiv.className = 'regions-group';
                    
                    const title = document.createElement('div');
                    title.className = 'regions-title';
                    title.textContent = 'Регионы:';
                    regionsDiv.appendChild(title);
                    
                    const grid = document.createElement('div');
                    grid.className = 'regions-grid';
                    
                    regions.forEach(r => {
                        const label = document.createElement('label');
                        label.className = 'region-checkbox';
                        
                        const cb = document.createElement('input');
                        cb.type = 'checkbox';
                        cb.checked = block.params.regions?.includes(r) || false;
                        cb.onchange = () => {
                            if (!block.params.regions) block.params.regions = [];
                            if (cb.checked) {
                                if (!block.params.regions.includes(r)) {
                                    block.params.regions.push(r);
                                }
                            } else {
                                block.params.regions = block.params.regions.filter(x => x !== r);
                            }
                        };
                        
                        label.appendChild(cb);
                        label.appendChild(document.createTextNode(r));
                        grid.appendChild(label);
                    });
                    
                    regionsDiv.appendChild(grid);
                    paramsDiv.appendChild(regionsDiv);
                }
            }
            
            if (block.type === 'search') {
                const select = document.createElement('select');
                select.className = 'param-select';
                valueTypes.forEach(t => {
                    const opt = document.createElement('option');
                    opt.value = t;
                    opt.textContent = t;
                    opt.selected = block.params.type === t;
                    select.appendChild(opt);
                });
                select.onchange = (e) => block.params.type = e.target.value;
                paramsDiv.appendChild(select);
            }
            
            if (block.type === 'editAll') {
                const select = document.createElement('select');
                select.className = 'param-select';
                valueTypes.forEach(t => {
                    const opt = document.createElement('option');
                    opt.value = t;
                    opt.textContent = t;
                    opt.selected = block.params.type === t;
                    select.appendChild(opt);
                });
                select.onchange = (e) => block.params.type = e.target.value;
                paramsDiv.appendChild(select);
            }
            
            if (block.type === 'sleep') {
                addTextParam(paramsDiv, block.params, 'time', 'время (мс)');
            }
            
            if (block.type === 'setvisible') {
                const select = document.createElement('select');
                select.className = 'param-select';
                ['false', 'true'].forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = s;
                    opt.textContent = s === 'true' ? 'скрыть' : 'показать';
                    opt.selected = block.params.state === s;
                    select.appendChild(opt);
                });
                select.onchange = (e) => block.params.state = e.target.value;
                paramsDiv.appendChild(select);
            }
            
            blockEl.appendChild(paramsDiv);
            container.appendChild(blockEl);
        });
    }

    function addTextParam(container, params, field, placeholder) {
        const input = document.createElement('input');
        input.className = 'param-input';
        input.placeholder = placeholder;
        input.value = params[field] || '';
        input.oninput = (e) => params[field] = e.target.value;
        container.appendChild(input);
    }

    function handleDrop(e) {
        e.preventDefault();
        const data = e.dataTransfer.getData('text/plain');
        if (!data) return;
        
        try {
            const blockData = JSON.parse(data);
            const newBlock = {
                id: 'block_' + Date.now() + '_' + Math.random(),
                menuId: activeMenu,
                type: blockData.type,
                params: blockData.params
            };
            blocks.push(newBlock);
            renderScriptBlocks();
            collectPromptVariables();
        } catch (err) {
            alert('Ошибка при добавлении блока');
        }
    }

    function addMenuItem() {
        const newId = 'menu_' + Date.now();
        menuItems.push({ 
            id: newId, 
            name: 'Новый пункт', 
            promptEnabled: false, 
            promptText: 'Введите значение',
            checkboxMode: false
        });
        activeMenu = newId;
        renderMenuTabs();
        renderMenuList();
        renderMenuCheckboxes();
        renderScriptBlocks();
    }

    function generateCode() {
        let code = `--[[ ${document.getElementById('scriptName').value} ]]\n`;
        code += `gg.setVisible(true)\n\n`;
        code += `function main()\n`;
        
        code += `  local menu = {\n`;
        menuItems.forEach(item => {
            code += `    "${item.name}",\n`;
        });
        code += `  }\n`;
        code += `  local sel = gg.choice(menu, nil, "🚀 выбери пункт")\n`;
        code += `  if not sel then return end\n\n`;
        
        menuItems.forEach((item, idx) => {
            const itemBlocks = blocks.filter(b => b.menuId === item.id);
            
            code += `  if sel[${idx + 1}] then  -- ${item.name}\n`;
            
            if (item.promptEnabled) {
                const varName = 'menu_input_' + idx;
                code += `    local ${varName} = gg.prompt({\n`;
                code += `      "${item.promptText || 'Введите значение'}"\n`;
                code += `    }, {""}, {"number"})\n`;
                code += `    if not ${varName} then return end\n`;
                code += `    ${varName} = ${varName}[1]\n\n`;
            }
            
            let allRegions = [];
            itemBlocks.forEach(block => {
                if ((block.type === 'search' || block.type === 'refine') && block.params.regions) {
                    allRegions = [...allRegions, ...block.params.regions];
                }
            });
            
            if (allRegions.length > 0) {
                let uniqueRegions = [...new Set(allRegions)];
                let regionExpr = uniqueRegions.map(r => regionMap[r] || 'gg.REGION_ANONYMOUS').join(' | ');
                code += `    gg.setRanges(${regionExpr})\n`;
            }
            
            itemBlocks.forEach(block => {
                const p = block.params;
                switch(block.type) {
                    case 'toast':
                        code += `    gg.toast("${p.text || ''}")\n`;
                        break;
                    case 'alert':
                        code += `    gg.alert("${p.text || ''}")\n`;
                        break;
                    case 'prompt':
                        code += `    local ${p.varName || 'val'} = gg.prompt({\n`;
                        code += `      "${p.text || 'Введите значение'}"\n`;
                        code += `    }, {""}, {"number"})\n`;
                        code += `    if not ${p.varName || 'val'} then return end\n`;
                        code += `    ${p.varName || 'val'} = ${p.varName || 'val'}[1]\n\n`;
                        break;
                    case 'search':
                        if (p.useVar && p.varName) {
                            code += `    gg.searchNumber(${p.varName}, gg.TYPE_${(p.type || 'dword').toUpperCase()})\n`;
                        } else {
                            code += `    gg.searchNumber('${p.value || '0'}', gg.TYPE_${(p.type || 'dword').toUpperCase()})\n`;
                        }
                        break;
                    case 'refine':
                        if (p.useVar && p.varName) {
                            code += `    gg.refineNumber(${p.varName})\n`;
                        } else {
                            code += `    gg.refineNumber('${p.value || '0'}')\n`;
                        }
                        break;
                    case 'editAll':
                        code += `    gg.getResults(99999)\n`;
                        if (p.useVar && p.varName) {
                            code += `    gg.editAll(${p.varName}, gg.TYPE_${(p.type || 'dword').toUpperCase()})\n`;
                        } else {
                            code += `    gg.editAll('${p.value || '0'}', gg.TYPE_${(p.type || 'dword').toUpperCase()})\n`;
                        }
                        break;
                    case 'sleep':
                        code += `    gg.sleep(${p.time || 1000})\n`;
                        break;
                    case 'setvisible':
                        code += `    gg.setVisible(${p.state == 'true'})\n`;
                        break;
                }
            });
            
            if (!item.checkboxMode) {
                code += `    gg.setVisible(false)\n`;
            }
            
            code += `  end\n\n`;
        });
        
        code += `end\n\n`;
        code += `while true do\n`;
        code += `  if gg.isVisible() then\n`;
        code += `    main()\n`;
        code += `  end\n`;
        code += `  gg.sleep(1000)\n`;
        code += `end\n`;
        
        return code;
    }

    function downloadScript() {
        const code = generateCode();
        const name = document.getElementById('scriptName').value || 'script';
        const filename = name.endsWith('.lua') ? name : name + '.lua';
        
        const dataUrl = 'data:application/octet-stream,' + encodeURIComponent(code);
        
        const link = document.createElement('a');
        link.href = dataUrl;
        link.download = filename;
        link.style.display = 'none';
        
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        document.getElementById('infoMsg').innerHTML = '✅ Если не скачалось: нажми и удержи <a href="' + dataUrl + '" download="' + filename + '" style="color:#b08fff">ЭТУ ССЫЛКУ</a> и выбери "Сохранить ссылку как"';
    }

    function previewCode() {
        document.getElementById('previewCode').textContent = generateCode();
        document.getElementById('previewModal').classList.remove('hide');
    }

    function closePreview() {
        document.getElementById('previewModal').classList.add('hide');
    }

    function changeTheme(color) {
        document.querySelector('.container').style.background = color;
    }

    init();
</script>
</body>
